<!DOCTYPE html>
<html>
<head>
  <title>Survey</title>
  <link rel="stylesheet" href="formatting.css">
  <link rel="stylesheet" href="layout.css">
</head>
<body>
  <script>
         var date = new Date();
    var date.str = Date.toLocaleDateString();
    var time.str = Date.toLocaleTimeString();
  </script>
  <!-- Alert -->
  <script>
    alert("Welcome to my survey!");
  </script>
  <!-- Form -->
  <form action="Feedback.html" method='POST'>
    <h1>Welcome To The Survey!</h1>
          <!-- Fieldset -->
  <fieldset name="blog feedback">
    <!--Slider-->
    <label for="rating">On a scale of 1-10, how much did you enjoy the blog?</label>
    <br>
    <span>1</span>
    <input type="range" name ="rating" id="rating" value="5" min="1" max="10">
    <span>10</span>
    <hr>
    <!-- Radio -->
    <span>What was your favorite place covered?</span>
    <br>
    <input type="radio" name="favoriteBlog" id="franceGermany" value="yes">
    <label for ="franceGermany"> France and Germany </label>
    <br>
   <input type="radio" name="favoriteBlog" id="italyGreece" value="yes">
   <label for ="italyGreece"> Italy and Greece</label>
   <br>
   <input type="radio" name="favoriteBlog" id="wyoming" value="yes">
   <label for="wyoming">Wyoming</label>
  </fieldset>
    <!-- Text Area -->
    <label for "favoritePlace">What is your favorite place you've traveled to?</label>
    <br>
    <textarea id="favoritePlace" name="favoritePlace" rows='4' cols="40"></textarea>
    <br>
    <input type="submit" value="Submit">
  </form>
  <form action="newsletter.html" method="post">
    <h2>Sign up for the newsletter!</h2>
    <!-- Fieldset 2-->
  <fieldset name="contact information">
    <!-- Text -->
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required>
    <br>
    <br>
    <!-- Email type -->
    <label for="email">Email:</label>
    <input type="email" id='email' name="email" required>
    <br>
    <br>
  </fieldset>
    <!-- Submit and Reset buttons -->
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">
  </form>
  <a href="index.html">BACK</a>
</body>
</html>
